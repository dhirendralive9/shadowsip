name: Build PJSIP + ShadowSIP

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ==================================================
  # Build pjsua2 for Linux
  # ==================================================
  build-pjsip-linux:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            build-essential python3-dev swig \
            libasound2-dev libpulse-dev \
            libssl-dev libsrtp2-dev libopus-dev uuid-dev
          pip install setuptools

      - name: Build PJSIP
        run: |
          cd /tmp
          git clone --depth 1 --branch 2.14.1 https://github.com/pjsip/pjproject.git
          cd pjproject

          cat > pjlib/include/pj/config_site.h << 'EOF'
          #define PJMEDIA_AUDIO_DEV_HAS_ALSA      1
          #define PJMEDIA_HAS_SRTP                1
          #define PJMEDIA_HAS_OPUS_CODEC          1
          #define PJSUA_MAX_ACC                   8
          #define PJSUA_MAX_CALLS                 16
          EOF

          export CFLAGS="-fPIC"
          export CXXFLAGS="-fPIC"
          ./configure --enable-shared
          make dep -j$(nproc)
          make -j$(nproc)
          sudo make install
          sudo ldconfig

      - name: Build pjsua2 Python bindings
        run: |
          cd /tmp/pjproject/pjsip-apps/src/swig

          # Step 1: Regenerate SWIG wrapper (skip Java entirely)
          swig -python -c++ \
            -I../../../../pjlib/include \
            -I../../../../pjlib-util/include \
            -I../../../../pjmedia/include \
            -I../../../../pjsip/include \
            -I../../../../pjnath/include \
            -w312 -threads -DSWIG_NO_EXPORT_ITERATOR_METHODS \
            -o python/pjsua2_wrap.cpp pjsua2.i

          # Step 2: Build ONLY the Python module (not Java)
          cd python
          python setup.py build

          # Step 3: Collect output
          mkdir -p /tmp/pjsua2-dist
          find build/ -name "_pjsua2*" -type f -exec cp {} /tmp/pjsua2-dist/ \;
          cp pjsua2.py /tmp/pjsua2-dist/ 2>/dev/null || true

      - name: Test import
        run: |
          export PYTHONPATH=/tmp/pjsua2-dist
          python -c "import pjsua2; print('pjsua2 OK - Linux py${{ matrix.python }}')"

      - uses: actions/upload-artifact@v4
        with:
          name: pjsua2-linux-py${{ matrix.python }}
          path: /tmp/pjsua2-dist/
          retention-days: 90

  # ==================================================
  # Build pjsua2 for Windows via MSYS2
  # ==================================================
  build-pjsip-windows:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-openssl
            mingw-w64-x86_64-opus
            mingw-w64-x86_64-python
            mingw-w64-x86_64-python-setuptools
            mingw-w64-x86_64-swig
            make
            git

      - name: Build PJSIP + pjsua2
        shell: msys2 {0}
        run: |
          cd /tmp
          git clone --depth 1 --branch 2.14.1 https://github.com/pjsip/pjproject.git
          cd pjproject

          cat > pjlib/include/pj/config_site.h << 'EOF'
          #define PJMEDIA_HAS_SRTP                1
          #define PJMEDIA_HAS_OPUS_CODEC          1
          #define PJSUA_MAX_ACC                   8
          #define PJSUA_MAX_CALLS                 16
          EOF

          export CFLAGS="-fPIC"
          export CXXFLAGS="-fPIC"
          ./configure --enable-shared
          make dep -j$(nproc)
          make -j$(nproc)

          # Regenerate SWIG wrapper (Python only, no Java)
          cd pjsip-apps/src/swig
          swig -python -c++ \
            -I../../../../pjlib/include \
            -I../../../../pjlib-util/include \
            -I../../../../pjmedia/include \
            -I../../../../pjsip/include \
            -I../../../../pjnath/include \
            -w312 -threads -DSWIG_NO_EXPORT_ITERATOR_METHODS \
            -o python/pjsua2_wrap.cpp pjsua2.i

          # Build ONLY Python module
          cd python
          python3 setup.py build

          # Collect
          mkdir -p /tmp/pjsua2-dist
          find build/ -name "_pjsua2*" -type f -exec cp {} /tmp/pjsua2-dist/ \;
          cp pjsua2.py /tmp/pjsua2-dist/ 2>/dev/null || true

          # Bundle MinGW DLLs
          for dll in libgcc_s_seh-1.dll libstdc++-6.dll libwinpthread-1.dll; do
            cp /mingw64/bin/$dll /tmp/pjsua2-dist/ 2>/dev/null || true
          done

          echo "=== Built files ==="
          ls -la /tmp/pjsua2-dist/

      - uses: actions/upload-artifact@v4
        with:
          name: pjsua2-windows-py${{ matrix.python }}
          path: C:\msys64\tmp\pjsua2-dist\
          retention-days: 90

  # ==================================================
  # Build ShadowSIP app
  # ==================================================
  build-app:
    needs: [build-pjsip-linux, build-pjsip-windows]
    if: always()
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            python: "3.11"
            pjsip_name: pjsua2-linux-py3.11
            app_name: ShadowSIP-Linux
          - os: windows-latest
            python: "3.11"
            pjsip_name: pjsua2-windows-py3.11
            app_name: ShadowSIP-Windows

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libegl1 libxkbcommon0 libxcb-cursor0 \
            libxcb-icccm4 libxcb-keysyms1 libxcb-shape0

      - name: Install Python deps
        run: pip install PySide6 pyinstaller

      - name: Download pjsua2
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: ${{ matrix.pjsip_name }}
          path: pjsua2-bindings/

      - name: Bundle pjsua2
        shell: bash
        continue-on-error: true
        run: |
          if [ -d "pjsua2-bindings" ] && [ "$(ls pjsua2-bindings/ 2>/dev/null)" ]; then
            echo "Bundling pjsua2..."
            cp pjsua2-bindings/* src/shadowsip/core/ 2>/dev/null || true
          else
            echo "No pjsua2 — MOCK mode"
          fi

      - name: Install & build
        run: |
          pip install -e .
          python scripts/package.py

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.app_name }}
          path: dist/ShadowSIP/
          retention-days: 30
