name: ShadowSIP Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-22.04, windows-latest]
        python: ["3.11"]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install system dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libegl1 libxkbcommon0 libxcb-cursor0 \
            libxcb-icccm4 libxcb-keysyms1 libxcb-shape0 \
            libasound2-dev libpulse-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PySide6 pyinstaller

      - name: Verify PySide6 import
        run: python -c "from PySide6.QtWidgets import QApplication; print('PySide6 OK')"

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short || echo "No tests yet"

      - name: Build with PyInstaller
        run: python scripts/package.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ShadowSIP-${{ runner.os }}
          path: dist/ShadowSIP/
          retention-days: 14
