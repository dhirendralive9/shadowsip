name: Build PJSIP + ShadowSIP

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ==================================================
  # Linux: Build pjsua2 + ShadowSIP app
  # ==================================================
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            build-essential python3-dev swig \
            libasound2-dev libpulse-dev \
            libssl-dev libsrtp2-dev libopus-dev uuid-dev \
            libegl1 libxkbcommon0 libxcb-cursor0 \
            libxcb-icccm4 libxcb-keysyms1 libxcb-shape0
          pip install setuptools PySide6 pyinstaller

      - name: Build PJSIP + pjsua2
        run: |
          cd /tmp
          git clone --depth 1 --branch 2.14.1 https://github.com/pjsip/pjproject.git
          cd pjproject
          PJ=$(pwd)
          cat > pjlib/include/pj/config_site.h << 'EOF'
          #define PJMEDIA_AUDIO_DEV_HAS_ALSA      1
          #define PJMEDIA_HAS_SRTP                1
          #define PJMEDIA_HAS_OPUS_CODEC          1
          #define PJSUA_MAX_ACC                   8
          #define PJSUA_MAX_CALLS                 16
          EOF
          export CFLAGS="-fPIC" CXXFLAGS="-fPIC"
          ./configure --enable-shared
          make dep -j$(nproc) && make -j$(nproc)
          sudo make install && sudo ldconfig

          # Build pjsua2 Python bindings
          cd pjsip-apps/src/swig
          swig -python -c++ \
            -I${PJ}/pjlib/include -I${PJ}/pjlib-util/include \
            -I${PJ}/pjmedia/include -I${PJ}/pjsip/include \
            -I${PJ}/pjnath/include \
            -w312 -threads -DSWIG_NO_EXPORT_ITERATOR_METHODS \
            -o python/pjsua2_wrap.cpp pjsua2.i
          cd python && python setup.py build && pip install .

      - name: Verify pjsua2
        run: python -c "import pjsua2; print('pjsua2 OK')"

      - name: Build ShadowSIP
        run: |
          # Copy pjsua2 into project
          SITE=$(python -c "import site; print(site.getsitepackages()[0])")
          cp ${SITE}/_pjsua2* src/shadowsip/core/ 2>/dev/null || true
          cp ${SITE}/pjsua2.py src/shadowsip/core/ 2>/dev/null || true
          pip install -e .
          python scripts/package.py

      - uses: actions/upload-artifact@v4
        with:
          name: pjsua2-linux-py3.11
          path: |
            /tmp/pjproject/pjsip-apps/src/swig/python/pjsua2.py
          retention-days: 90

      - uses: actions/upload-artifact@v4
        with:
          name: ShadowSIP-Linux
          path: dist/ShadowSIP/
          retention-days: 30

  # ==================================================
  # Windows: Build everything inside MSYS2
  # All tools from pacman = same ecosystem = compatible
  # ==================================================
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSYS2 with all packages
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-openssl
            mingw-w64-x86_64-opus
            mingw-w64-x86_64-python
            mingw-w64-x86_64-python-pip
            mingw-w64-x86_64-python-setuptools
            mingw-w64-x86_64-pyside6
            mingw-w64-x86_64-pyinstaller
            mingw-w64-x86_64-swig
            make
            git

      - name: Build PJSIP + pjsua2 + ShadowSIP
        shell: msys2 {0}
        run: |
          echo "=== Python version ==="
          python3 --version

          # === Build PJSIP ===
          cd /tmp
          git clone --depth 1 --branch 2.14.1 https://github.com/pjsip/pjproject.git
          cd pjproject
          PJ=$(pwd)

          cat > pjlib/include/pj/config_site.h << 'EOF'
          #define PJMEDIA_HAS_SRTP                1
          #define PJMEDIA_HAS_OPUS_CODEC          1
          #define PJSUA_MAX_ACC                   8
          #define PJSUA_MAX_CALLS                 16
          EOF

          export CFLAGS="-fPIC" CXXFLAGS="-fPIC"
          ./configure --enable-shared
          make dep -j$(nproc) && make -j$(nproc)

          # === Build pjsua2 SWIG Python bindings ===
          cd pjsip-apps/src/swig
          swig -python -c++ \
            -I${PJ}/pjlib/include -I${PJ}/pjlib-util/include \
            -I${PJ}/pjmedia/include -I${PJ}/pjsip/include \
            -I${PJ}/pjnath/include \
            -w312 -threads -DSWIG_NO_EXPORT_ITERATOR_METHODS \
            -o python/pjsua2_wrap.cpp pjsua2.i
          cd python
          python3 setup.py build
          python3 -m pip install .

          # === Verify pjsua2 loads ===
          python3 -c "import pjsua2; print('SUCCESS: pjsua2 loaded in MSYS2 Python')"

          # === Save pjsua2 artifact ===
          mkdir -p /tmp/pjsua2-dist
          PYVER=$(python3 -c "import sys; print(f'{sys.version_info.major}.{sys.version_info.minor}')")
          find /mingw64/lib/python${PYVER}/site-packages -name "_pjsua2*" -exec cp {} /tmp/pjsua2-dist/ \; 2>/dev/null || true
          find /mingw64/lib/python${PYVER}/site-packages -name "pjsua2.py" -exec cp {} /tmp/pjsua2-dist/ \; 2>/dev/null || true
          # Also check local site-packages
          find ~/.local/lib -name "_pjsua2*" -exec cp {} /tmp/pjsua2-dist/ \; 2>/dev/null || true
          find ~/.local/lib -name "pjsua2.py" -exec cp {} /tmp/pjsua2-dist/ \; 2>/dev/null || true
          for dll in libgcc_s_seh-1.dll libstdc++-6.dll libwinpthread-1.dll libssp-0.dll; do
            cp /mingw64/bin/$dll /tmp/pjsua2-dist/ 2>/dev/null || true
          done
          echo "=== pjsua2 dist ==="
          ls -la /tmp/pjsua2-dist/

          # === Build ShadowSIP app with MSYS2 PyInstaller ===
          cd $GITHUB_WORKSPACE

          # Copy pjsua2 into project source
          cp /tmp/pjsua2-dist/_pjsua2* src/shadowsip/core/ 2>/dev/null || true
          cp /tmp/pjsua2-dist/pjsua2.py src/shadowsip/core/ 2>/dev/null || true

          # Install ShadowSIP
          python3 -m pip install -e .

          # Run PyInstaller (MSYS2's native pyinstaller)
          pyinstaller shadowsip.spec --noconfirm --clean \
            --distpath=dist --workpath=build

          echo "=== Built app ==="
          ls -la dist/ShadowSIP/ 2>/dev/null || echo "Checking dist..."
          ls -la dist/ 2>/dev/null

      - uses: actions/upload-artifact@v4
        with:
          name: pjsua2-windows
          path: C:\msys64\tmp\pjsua2-dist\
          retention-days: 90

      - uses: actions/upload-artifact@v4
        with:
          name: ShadowSIP-Windows
          path: dist/ShadowSIP/
          if-no-files-found: warn
          retention-days: 30
